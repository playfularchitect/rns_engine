[build-system]
requires = ["setuptools>=64", "pybind11>=2.11"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "rns_engine"
version = "0.2.0"
description = "Exact integer arithmetic via AVX2-accelerated Residue Number System"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
dependencies = ["numpy>=1.21"]
keywords = ["arithmetic", "exact", "integer", "RNS", "residue", "SIMD", "AVX2"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://github.com/YOUR_USERNAME/rns_engine"
Issues   = "https://github.com/YOUR_USERNAME/rns_engine/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
rns_engine = ["*.pyi"]

[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-*"
skip  = "*-win32 *-manylinux_i686 *-musllinux*"

[tool.cibuildwheel.linux]
archs = ["x86_64"]

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]

[tool.cibuildwheel.windows]
archs = ["AMD64"]
