name: Build & Publish

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  # ── 1. Run tests ──────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps
        run: pip install pybind11 numpy pytest setuptools

      - name: Build in-place
        run: pip install -e .

      - name: Run tests
        run: pytest tests/ -v

  # ── 2. Build wheels ───────────────────────────────────────────────────────
  build_wheels:
    name: Wheels (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.21.3

      - name: Pre-cache virtualenv (Mac)
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/Library/Caches/cibuildwheel
          curl -L --retry 10 --retry-delay 15 --retry-all-errors \
            "https://github.com/pypa/get-virtualenv/blob/20.26.6/public/virtualenv.pyz?raw=true" \
            -o ~/Library/Caches/cibuildwheel/virtualenv-20.26.6.pyz

      - name: Pre-cache virtualenv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "$env:LOCALAPPDATA\pypa\cibuildwheel\Cache"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $url = "https://github.com/pypa/get-virtualenv/blob/20.26.6/public/virtualenv.pyz?raw=true"
          $out = "$dir\virtualenv-20.26.6.pyz"
          $maxRetries = 10
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
              Write-Host "Downloaded OK"
              break
            } catch {
              Write-Host "Attempt $i failed: $_"
              if ($i -lt $maxRetries) { Start-Sleep -Seconds 15 }
              else { exit 1 }
            }
          }

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ── 3. Build source distribution ─────────────────────────────────────────
  build_sdist:
    name: Source distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build pybind11 numpy

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── 4. Publish to PyPI on version tags ───────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/rns_engine/

    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
